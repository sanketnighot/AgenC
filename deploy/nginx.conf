# ── API ───────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name agenc-api.sanketnighot.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name agenc-api.sanketnighot.com;

    ssl_certificate     /etc/letsencrypt/live/agenc-api.sanketnighot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agenc-api.sanketnighot.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # SSE: disable buffering so events stream to the browser in real time
    location /api/events {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}

# ── Frontend ──────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name agenc.sanketnighot.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name agenc.sanketnighot.com;

    ssl_certificate     /etc/letsencrypt/live/agenc.sanketnighot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agenc.sanketnighot.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
